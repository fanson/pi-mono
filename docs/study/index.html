<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi-mono 架构学习指南</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #3F51B5;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #3F51B5;
      --sidebar-nav-link-border-color--active: #3F51B5;
      --code-font-size: 0.85em;
      --code-block-border-radius: 6px;
    }
    .markdown-section pre {
      background-color: #f6f8fa;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'pi-mono 学习指南',
      repo: 'https://github.com/badlogic/pi-mono',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: '搜索...',
        noData: '没有找到结果',
        depth: 3,
      },
      copyCode: {
        buttonText: '复制',
        successText: '已复制',
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
      },
      auto2top: true,
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
